{% extends "base.html" %}

{% block content %}
<div class="container">
  <h2 class="mb-4 text-primary">HMOs List</h2>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
          <thead class="table-primary">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Name</th>
              <th scope="col">Position</th>
              <th scope="col">Email</th>
              <th scope="col">Is Head</th>
            </tr>
          </thead>
          <tbody>
            {% for hmo in hmos %}
            <tr>
              <td>{{ hmo.HMO_ID }}</td>
              <td>{{ hmo.Name }}</td>
              <td>{{ hmo.Position }}</td>
              <td>{{ hmo.Email }}</td>
              <td>
                {% if hmo.Is_Head == 1 %}
                  ✅ Yes
                {% else %}
                  ❌ No
                {% endif %}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
