{% extends "base.html" %}

{% block content %}
<div class="container">
  <h2 class="mb-4 text-primary">Add Unit</h2>
  <form method="POST">
    <div class="mb-3">
      <label for="unit_id" class="form-label">Unit ID</label>
      <input 
        type="number"
        class="form-control"
        id="unit_id"
        name="unit_id"
        placeholder="Enter Unit ID"
        required
      >
    </div>
    <div class="mb-3">
      <label for="name" class="form-label">Unit Name</label>
      <input 
        type="text"
        class="form-control"
        id="name"
        name="name"
        placeholder="Enter Unit Name"
        required
      >
    </div>
    <button type="submit" class="btn btn-primary">Add Unit</button>
  </form>
</div>
{% endblock %}
