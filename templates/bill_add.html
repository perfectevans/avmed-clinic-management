{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h2 class="mb-4 text-primary">Add Bill</h2>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Bill ID</label>
          <input type="number" name="bill_id" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Prescription ID</label>
          <input type="number" name="prescription_id" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Amount</label>
          <input type="number" name="amount" step="0.01" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Paid Status</label>
          <input type="text" name="paid_status" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Payment Date</label>
          <input type="date" name="payment_date" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary w-100">Add Bill</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
