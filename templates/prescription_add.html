{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h2 class="mb-4 text-primary">Add Prescription</h2>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Prescription ID</label>
          <input type="number" name="prescription_id" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Appointment ID</label>
          <input type="number" name="appointment_id" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Doctor ID</label>
          <input type="number" name="doctor_id" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Patient ID</label>
          <input type="number" name="patient_id" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="4"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Date Prescribed</label>
          <input type="date" name="date_prescribed" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary w-100">Add Prescription</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
